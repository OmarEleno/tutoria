<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorado</title>
    <link rel="stylesheet" href="/css/tutorado.css">
</head>
<body>
    <header>
        <section>
            <img src="https://culiacan.ambar.tecnm.mx/estudiantes/Logo_TecNM_Horizontal_Blanco.svg" alt="logoTec">
            <p>Tareas</p>
        </section>
        <section>
            <span>INGENIERIA EN SISTEMAS COMPUTACIONALES</span>
            <p>Salir</p>
        </section>
    </header>
    <main>
        <section class="identificacion">
            <img src="https://culiacan.ambar.tecnm.mx/estudiantes/defaultImage.png" alt="foto perfil">
            <article>
                <p>
                <span th:text="${usuario.nombre}">Nombre del tutorado</span>
                <span th:text="${usuario.apePat}">apellido paterno</span>
                    <span th:text="${usuario.apeMat}">apellido materno</span>
                </p>
                <!--<p>25170284 - L25170284@CULIACAN.TECNM.MX</p>-->
                <p id="titulo">Carrera</p>
                <p th:text="${tutorado.carrera.nombre}">Carrera</p>
                <!--<p id="titulo">Semestre</p>
                <p>2</p>-->
            </article>
        </section>
        <section class="tareas">
                <h2>Mis cursos</h2>
                <article>
                    <div class="curso">
                        <img src="https://www.iadb.org/sites/default/files/migration/tutorias.remotas.jpg" alt="logo curso">
                        <a href="/curso.html">TUTORIAS AGOSTO - DIC 2025</a>
                        <p>Mirna del Rosario Quevedo Camacho</p>
                        </div>
                    <div class="curso">
                        <img src="https://www.culiacan.tecnm.mx/wp-content/uploads/2018/09/4630062-1568x1206.jpg" alt="logo curso">
                        <a href="/curso.html">TUTORIAS ENERO - JUNIO 2026</a>
                        <p>Mirna del Rosario Quevedo Camacho</p>
                    </div>
                </article>
        </section>
    </main>
</body>
</html>
