<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar tutorados</title>
    <link rel="stylesheet" href="/css/agregarTutorados.css">
</head>
<body>
     <header>
        <section>
            <img src="https://culiacan.ambar.tecnm.mx/estudiantes/Logo_TecNM_Horizontal_Blanco.svg" alt="logoTec">
            <p>Princpal</p>
        </section>
        <section>
            <div>
                <span>Departamento: </span>
                <span th:text="${departamento.nombre}">Departamento</span>
            </div>
            <form th:action="@{/salir}" method="post">
                <button type="submit" class="btnSalir">Salir</button>
            </form>
        </section>
    </header>
    <main>
        p
        <!--<h2 th:text="${tutor.id}">id</h2>-->
        <section class="buscar">
        <form th:action="@{/buscarTutor}" class="primera" method="post">
            <h3>Selecciona un tutor</h3>
                <select name="id" id="rol">
                    <option hidden selected value="a">Elige un tutor</option>
                    <option th:each="t : ${tutores}" th:value="${t.id}">
                        <span  th:text="${t.usuario.nombre}"></span>
                        <span  th:text="${t.usuario.apePat}"></span>
                        <span  th:text="${t.usuario.apeMat}"></span>
                    </option>
                </select>
                <button type="submit">Buscar</button>
        </form>   
        <div class="principal">
            <div class="formulario">
                <h3>Agregar tutorado</h3><!--${tutor.idEmpleado}-->
                <form th:action="@{/guardarTutorado}" method="post">
                    <div th:if="${usuarioTutor}">
                        <!--<h4>Usuario:</h4>
                        <h4 th:text="${usuarioTutor.nombre}">Tatatata</h4>-->
                        <input type="hidden" th:value="${usuarioTutor.nombreUsuario}" name="nombreTutor">
                    </div>
                    <div>
                        <label for="clave">No. de Control:</label>
                        <input type="text" id="clave" name="numControl" th:disabled="${usuarioTutor == null}">
                    </div>
                    <div>
                        <label for="apePat">Apellido Paterno:</label>
                        <input type="apePat" id="apePat"  name="apePat" th:disabled="${usuarioTutor == null}">
                    </div>
                    <div>
                        <label for="apeMat">Apellido materno:</label>
                        <input type="apeMat" id="apeMat"  name="apeMat" th:disabled="${usuarioTutor == null}">
                    </div>

                    <div>
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" th:disabled="${usuarioTutor == null}">
                    </div>
                    <!--<div>
                        <label for="correo">Correo:</label>
                        <input type="email" id="correo" required>
                    </div>-->
                    <button type="submit">Registrar Tutorado</button>
                </form>
                <form th:action="@{/regresar}" method="post">
                    <button type="submit">Regresar</button>
                </form>
            </div>
            <div class="tabla" th:if="${usuarioTutor == null}">
                <h3>Selecciona un tutor</h3>
            </div>
            <div class="tabla" th:if="${usuarioTutor}">
                <div id="mensajeExito" th:if="${mensajeExito}">
                    <p th:text="${mensajeExito}">hola</p>
                </div>
                <h3>
                    <span th:text="${usuarioTutor.nombre}">nombre</span>
                    <span th:text="${usuarioTutor.apePat}">apePat</span>
                    <span th:text="${usuarioTutor.apeMat}">apeMat</span>
                </h3>
                <hr>
                <h4 id="datosLista">
                    <div>
                        Cantidad de alumnos: <span th:text="${totalTutorados}">Numero</span>
                    </div>
                    <div>
                        Carrera: <span th:text="${tutor.carrera.nombre}">Numero</span>
                    </div>
                </h4>
                <table th:if="${!tutorados.empty}">
                    <tr>
                        <th>Número de control</th>
                        <th>Apellido Paterno</th>
                        <th>Apellido Materno</th>
                        <th id="nombreTabla">Nombre</th>
                        <th>Opciones</th>
                    </tr>
                    <tr th:each="t: ${tutorados}">
                        <td th:text="${t.id}">Numero de control</td>
                        <td th:text="${t.usuario.apePat}">Apellido paterno</td>
                        <td th:text="${t.usuario.apeMat}">Apellido materno</td>
                        <td th:text="${t.usuario.nombre}">Nombre</td>
                        <td id="botones">
                            <button>Editar</button>
                            <button>Eliminar</button>
                        </td>
                </table>
            </div>
        </div>       
        </section>
    </main>
</body>
</html>
