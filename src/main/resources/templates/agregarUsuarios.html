<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar usuario</title>
    <link rel="stylesheet" href="/css/agregar.css">
</head>
<body>
     <header>
        <section>
            <img src="https://culiacan.ambar.tecnm.mx/estudiantes/Logo_TecNM_Horizontal_Blanco.svg" alt="logoTec">
            <p>Principal</p>
        </section>
        <section>
            <span>COORDINACIÓN INSTITUCIONAL DE TUTORIAS</span>
            <p>Salir</p>
        </section>
    </header>
    <main>
        p
        <section class="form">
            <h2>Agrega un nuevo usuario</h2>
            <div>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre">
            </div>
            <div>
                <label for="rol">Rol:</label>
                <select name="rol" id="rol">
                        <option value="1">Director</option>
                    <option value="1">Subdirector</option>
                    <option value="1">Coordinador Institucional de tutorias</option>
                    <option value="1">Coordinador Departamental de tutorias</option>
                    <option value="1">Jefe de departamento academico</option>
                </select>
            </div>          
            <button type="submit">Guardar Usuario</button>
        </section>
    </main>
</body>
</html>
